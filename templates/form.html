<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-indigo-600 p-6 text-center">
            <h1 class="text-2xl font-bold text-white">Student Registration</h1>
            <p class="text-indigo-100 text-sm mt-1">Enter your details for the upcoming exam</p>
        </div>

        <form action="/register" method="POST" class="p-8 space-y-5">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="bg-red-100 text-red-700 p-3 rounded-lg text-sm mb-4">
                  {{ messages[0] }}
                </div>
              {% endif %}
            {% endwith %}

            <div>
                <label class="block text-sm font-semibold text-gray-700">Full Name</label>
                <input type="text" name="name" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Roll Number</label>
                    <input type="text" name="roll_no" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Branch</label>
                    <select name="branch" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition">
                        <option>CS</option>
                        <option>IT</option>
                        <option>MECH</option>
                        <option>ECE</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Select Subjects</label>
                <div class="grid grid-cols-2 gap-2">
                    {% for sub in ['Math', 'Physics', 'Computer', 'English'] %}
                    <label class="flex items-center space-x-3 p-3 border rounded-lg cursor-pointer hover:bg-indigo-50 transition">
                        <input type="checkbox" name="subjects" value="{{ sub }}" class="w-4 h-4 text-indigo-600 focus:ring-indigo-500">
                        <span class="text-sm text-gray-700">{{ sub }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 transform hover:-translate-y-0.5 transition duration-200">
                Register & Generate Hall Ticket
            </button>
        </form>
    </div>
</body>
</html>
