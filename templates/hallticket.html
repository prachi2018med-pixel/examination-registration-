<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hall Ticket - {{ s.roll_no }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-2xl mx-auto bg-white border-2 border-indigo-600 rounded-xl shadow-2xl overflow-hidden">
        <div class="bg-indigo-600 p-4 text-center text-white">
            <h1 class="text-2xl font-bold uppercase">Exam Hall Ticket 2026</h1>
        </div>
        
        <div class="p-8 grid grid-cols-3 gap-6">
            <div class="col-span-2 space-y-4">
                <p><strong>Name:</strong> {{ s.name }}</p>
                <p><strong>Roll No:</strong> {{ s.roll_no }}</p>
                <p><strong>Branch:</strong> {{ s.branch }}</p>
                <div>
                    <strong>Subjects:</strong>
                    <div class="flex flex-wrap gap-2 mt-2">
                        {% for sub in s.subjects.split(', ') %}
                        <span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold">{{ sub }}</span>
                        {% endfor %}
                    </div>
                </div>
            </div>
            
            <div class="text-center border-l pl-6">
                <img src="{{ url_for('static', filename='qrcodes/' ~ s.id ~ '.png') }}" class="w-32 h-32 mx-auto">
                <p class="text-[10px] text-gray-400 mt-2">Scan to Verify</p>
            </div>
        </div>

        {% if not is_pdf %}
        <div class="p-6 bg-gray-50 flex justify-center gap-4 border-t">
            <a href="/" class="text-gray-500 hover:underline">New Registration</a>
            <a href="{{ url_for('download_pdf', student_id=s.id) }}" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700">
                Download PDF
            </a>
        </div>
        {% endif %}
    </div>
</body>
</html>
